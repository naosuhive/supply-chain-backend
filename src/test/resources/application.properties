spring.datasource.url=jdbc:h2:mem:supply_chain_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

app.jwt.secret=test_secret_key_for_hs256_signing_123456
app.jwt.expiration-ms=3600000
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test@example.com
spring.mail.password=test-password
sms.api.url=https://example.test/sms
sms.api.key=test-api-key
sms.sender.id=TEST

spring.sql.init.mode=never
spring.h2.console.enabled=false
