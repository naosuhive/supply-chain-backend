# PostgreSQL production configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:supply_chain}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.datasource.hikari.maximum-pool-size=10
spring.sql.init.mode=never

# JWT configuration (override from environment)
app.jwt.secret=${JWT_SECRET:change_me_in_production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Logging
logging.level.root=WARN
logging.level.com.noasuhive.supply_chain_management=INFO
