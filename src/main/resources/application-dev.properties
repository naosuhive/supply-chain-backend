# Development configuration (persistent H2 database)
spring.datasource.url=jdbc:h2:file:${user.home}/.supply-chain-management/dev-db/supply_chain_dev;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT configuration
app.jwt.secret=dev_secret_key_min_32_chars_for_hs256
app.jwt.expiration-ms=86400000

# Logging
logging.level.root=INFO
logging.level.com.noasuhive.supply_chain_management=DEBUG
logging.level.org.springframework.security=DEBUG

spring.sql.init.mode=never
