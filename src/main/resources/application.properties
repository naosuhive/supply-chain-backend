spring.application.name=supply-chain-management

# Default configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:supply_chain;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT configuration
app.jwt.secret=dev_secret_key_change_in_production_min_32_chars
app.jwt.expiration-ms=3600000

# Logging
logging.level.root=INFO
logging.level.com.noasuhive.supply_chain_management=DEBUG

